<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary SEO -->
    <title>Aventix — Web, Mobile & AI Development Services</title>
    <meta name="description" content="Aventix builds websites, Android & iOS apps, WordPress sites, API integrations, software & load testing, and AI-powered solutions for startups and growing businesses." />
    <meta name="keywords" content="web development, android app development, ios app development, wordpress development, api integration, load testing, software testing, ai integration, react developer, full stack developer" />
    <meta name="author" content="Aventix" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://aventix.dev/" />

    <!-- Theme & Icons -->
    <meta name="theme-color" content="#0284c7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0c0a09" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Aventix" />
    <meta property="og:title" content="Aventix — Web, Mobile & AI Development Services" />
    <meta property="og:description" content="Websites, Android & iOS apps, WordPress, API integration, load testing, and AI integration — practical solutions, delivered with care." />
    <meta property="og:url" content="https://aventix.dev/" />
    <meta property="og:image" content="https://aventix.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aventix — Web, Mobile & AI Development Services" />
    <meta name="twitter:description" content="Websites, Android & iOS apps, WordPress, API integration, load testing, and AI integration." />
    <meta name="twitter:image" content="https://aventix.dev/og-image.png" />

    <!-- Performance hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- No-flash dark-mode bootstrap (runs before React mounts) -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || (!stored && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>

    <!-- Organization JSON-LD -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Aventix",
        "url": "https://aventix.dev",
        "logo": "https://aventix.dev/favicon.svg",
        "description": "Web, mobile, and AI development services including websites, Android/iOS apps, WordPress, API integration, load testing, and AI integration.",
        "sameAs": []
      }
    </script>
  </head>
  <body>
    <a href="#main-content" class="skip-to-content">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
